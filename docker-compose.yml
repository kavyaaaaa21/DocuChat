version: "3.9"

# ─────────────────────────────────────────────
#  DocuChat AI — Docker Compose
#  Usage:
#    docker compose up --build          # start all services
#    docker compose up backend          # backend only
#    docker compose down -v             # stop + remove volumes
# ─────────────────────────────────────────────

services:

  # ── FastAPI Backend ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuchat_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/app/storage/uploads
      - FAISS_INDEX_DIR=/app/storage/faiss_index
    volumes:
      - ./backend:/app                          # live reload in dev
      - uploads_data:/app/storage/uploads
      - faiss_data:/app/storage/faiss_index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuchat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000/api

# ── Named Volumes ──────────────────────────────
volumes:
  uploads_data:
    driver: local
  faiss_data:
    driver: local
